# @package _global_
# SnareNet for Convex QCQP dataset
# Usage: python3 run_experiment.py +experiment=snarenet_cvx_qcqp dataset=cvx_qcqp model=snarenet

epochs: 1000
batch_size: 100
learning_rate: 0.0001

model:
  lambd: 1e-2
  trust_region: false
  adaptive_relaxation: true
  decay_epochs: 500
  rtol: 1.0e-6
