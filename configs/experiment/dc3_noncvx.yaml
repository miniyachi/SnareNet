# @package _global_
# DC3 baseline for Non-convex dataset
# Usage: python3 run_experiment.py +experiment=dc3_noncvx dataset=noncvx model=dc3

epochs: 2000
batch_size: 200
learning_rate: 0.0001

soft_epochs: 0
soft_weight: 10

# DC3-specific settings for noncvx
model:
  hidden_size: 200
  useCompl: true
  useTrainCorr: true
  useTestCorr: true

  corrMode: partial
  corrTrainSteps: 10
  corrTestMaxSteps: 10
  corrEps: 1e-4
  corrLr: 1e-7
  corrMomentum: 0.5