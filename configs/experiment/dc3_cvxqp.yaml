# @package _global_
# DC3 baseline for CVXQP dataset
# Usage: python3 run_experiment.py +experiment=dc3_cvxqp dataset=cvxqp model=dc3

batch_size: 100
learning_rate: 0.0001

soft_epochs: 0
soft_weight: 10

# DC3-specific settings for cvxqp
model:
  hidden_size: 200
  useCompl: true
  useTrainCorr: true
  useTestCorr: true

  corrMode: partial
  corrTrainSteps: 10
  corrTestMaxSteps: 10
  corrEps: 1e-4
  corrLr: 1e-7
  corrMomentum: 0.5
